upstream api {
    server api:8000;
    keepalive 32;
}

# HTTP — redirect to HTTPS (once SSL is set up)
server {
    listen 80;
    server_name _;

    # Let's Encrypt verification files
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name api.punjabiwelfaretrust.org;

    ssl_certificate     /etc/letsencrypt/live/api.punjabiwelfaretrust.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.punjabiwelfaretrust.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Large uploads (volunteer video submissions)
    client_max_body_size 500M;
    client_body_timeout  300s;

    # ── REST API ────────────────────────────────────────────────────────────────
    location / {
        proxy_pass          http://api;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout  300s;
    }

    # ── WebSocket (live chat) ────────────────────────────────────────────────
    location /ws/ {
        proxy_pass          http://api;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
